# Build options for ./build-deb.sh.
#
# AppIndicator backend:
#   auto          Prefer ayatana-glib, then appindicator, then ayatana-gtk3.
#   ayatana-glib  Use libayatana-appindicator-glib. Removes the Ayatana GTK3
#                 deprecation warning on systems that provide it.
#   appindicator  Use legacy libappindicator3.
#   ayatana-gtk3  Use legacy libayatana-appindicator3.
APPINDICATOR_BACKEND=auto
