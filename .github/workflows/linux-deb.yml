name: Linux DEB

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  build-deb:
    name: Build DEB on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-22.04
            container: ubuntu:22.04
          - distro: ubuntu-24.04
            container: ubuntu:24.04
          - distro: debian-12
            container: debian:12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debian package
        run: ./build-deb.sh --clean

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: radiotray-lite-${{ matrix.distro }}-deb
          path: build-deb/packages/*.deb
          if-no-files-found: error
